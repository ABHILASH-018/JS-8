<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Booking App</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navigation -->

    <nav>

        <div class="logo">
            ServiceBooking
        </div>

        <ul>

            <li><a href="#">Home</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Contact Us</a></li>

        </ul>

        <div class="user">

            Welcome

            <button id="logoutBtn">
                Logout
            </button>

        </div>

    </nav>


    <!-- Main Container -->

    <div class="container">

        <!-- Left Side -->

        <div class="left">

            <h2>Added Services</h2>

            <ul id="addedServices">

                <li>No services added.</li>

            </ul>

            <h3>Total Amount</h3>

            <h2>₹ <span id="totalAmount">0</span></h2>

            <hr>

            <h2>Book Now</h2>

            <form id="bookingForm">

                <input
                    type="text"
                    id="name"
                    placeholder="Full Name"
                    required
                >

                <input
                    type="email"
                    id="email"
                    placeholder="Email"
                    required
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <button type="submit">

                    Book Now

                </button>

            </form>

        </div>


        <!-- Right Side -->

        <div class="right">

            <h1>Browse Our Services</h1>

            <p>

                Choose your required service below.

            </p>

            <div id="serviceContainer">

                <!-- Cards generated by JavaScript -->

            </div>

            <div class="cartButtons">

                <button id="addCart">

                    Add to Cart

                </button>

                <button id="bookService">

                    Book Now

                </button>

            </div>

        </div>

    </div>

<script src="script.js"></script>

</body>
</html>
