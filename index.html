<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Booking App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Service Booking App</h1>

<div class="container">

    <!-- Left Side -->
    <div class="left">

        <h2>Cart</h2>

        <ul id="addedServices">
            <li>No services added.</li>
        </ul>

        <h3>Total Amount</h3>

        <p>₹ <span id="totalAmount">0</span></p>

        <hr>

        <h2>Booking Form</h2>

        <form id="bookingForm">

            <input
                type="text"
                id="name"
                placeholder="Enter your name"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Enter password"
                required
            >

            <button type="submit">
                Book Service
            </button>

        </form>

    </div>

    <!-- Right Side -->

    <div class="right">

        <h2>Available Services</h2>

        <div id="serviceContainer">

            <!-- Cards will come from JavaScript -->

        </div>

        <br>

        <button id="bookService">
            Go To Booking
        </button>

        <button id="logoutBtn">
            Logout
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
